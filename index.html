<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrampolineDichtheid</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
    #info {
      position: fixed;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 1000;
    }
    #info strong { color: #e8ff47; font-size: 18px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    TrampolineDichtheid &nbsp;|&nbsp; <strong id="total">0</strong> locaties
  </div>
  <script>
    // Seed data
    var DATA = [
      {lat:52.3676,lon:4.9041,city:"Amsterdam"},
      {lat:52.3702,lon:4.8952,city:"Amsterdam"},
      {lat:52.3588,lon:4.8810,city:"Amsterdam"},
      {lat:52.3800,lon:4.9200,city:"Amsterdam"},
      {lat:52.3500,lon:4.9100,city:"Amsterdam"},
      {lat:52.3750,lon:4.8700,city:"Amsterdam"},
      {lat:52.3650,lon:4.9300,city:"Amsterdam"},
      {lat:52.3900,lon:4.9000,city:"Amsterdam"},
      {lat:52.9225,lon:4.4792,city:"Rotterdam"},
      {lat:51.9100,lon:4.4900,city:"Rotterdam"},
      {lat:51.9300,lon:4.4600,city:"Rotterdam"},
      {lat:51.9050,lon:4.4700,city:"Rotterdam"},
      {lat:51.9400,lon:4.5000,city:"Rotterdam"},
      {lat:51.9180,lon:4.4500,city:"Rotterdam"},
      {lat:52.0705,lon:4.3007,city:"Den Haag"},
      {lat:52.0800,lon:4.3100,city:"Den Haag"},
      {lat:52.0600,lon:4.2900,city:"Den Haag"},
      {lat:52.0900,lon:4.3200,city:"Den Haag"},
      {lat:52.0907,lon:5.1214,city:"Utrecht"},
      {lat:52.0800,lon:5.1100,city:"Utrecht"},
      {lat:52.1000,lon:5.1300,city:"Utrecht"},
      {lat:52.0700,lon:5.1000,city:"Utrecht"},
      {lat:51.4416,lon:5.4697,city:"Eindhoven"},
      {lat:51.4300,lon:5.4800,city:"Eindhoven"},
      {lat:51.4500,lon:5.4600,city:"Eindhoven"},
      {lat:53.2194,lon:6.5665,city:"Groningen"},
      {lat:53.2100,lon:6.5500,city:"Groningen"},
      {lat:51.5555,lon:5.0913,city:"Tilburg"},
      {lat:51.5450,lon:5.0800,city:"Tilburg"},
      {lat:52.3508,lon:5.2647,city:"Almere"},
      {lat:52.3400,lon:5.2500,city:"Almere"},
      {lat:51.5719,lon:4.7683,city:"Breda"},
      {lat:51.8426,lon:5.8546,city:"Nijmegen"},
      {lat:52.3874,lon:4.6462,city:"Haarlem"},
      {lat:51.9851,lon:5.8987,city:"Arnhem"},
      {lat:52.1561,lon:5.3878,city:"Amersfoort"},
      {lat:50.8514,lon:5.6910,city:"Maastricht"},
      {lat:52.5168,lon:6.0830,city:"Zwolle"},
      {lat:52.1601,lon:4.4970,city:"Leiden"},
      {lat:52.0116,lon:4.3571,city:"Delft"},
    ];

    // Build clusters per city
    function buildClusters(points) {
      var cities = {};
      points.forEach(function(p) {
        if (!cities[p.city]) cities[p.city] = { city: p.city, count: 0, lats: [], lons: [] };
        cities[p.city].count++;
        cities[p.city].lats.push(p.lat);
        cities[p.city].lons.push(p.lon);
      });
      return Object.values(cities).map(function(c) {
        return {
          city: c.city,
          count: c.count,
          lat: c.lats.reduce(function(a,b){return a+b},0) / c.lats.length,
          lon: c.lons.reduce(function(a,b){return a+b},0) / c.lons.length,
        };
      }).sort(function(a,b){ return b.count - a.count; });
    }

    // Color scale
    function countToColor(count, max) {
      var t = Math.min(count / max, 1);
      var r = Math.round(0 + t * 255);
      var g = Math.round(200 - t * 100);
      var b = Math.round(255 - t * 255);
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    // Init map
    var map = L.map('map').setView([52.2, 5.3], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    var bubbleLayer = L.layerGroup().addTo(map);

    function renderBubbles() {
      bubbleLayer.clearLayers();
      var clusters = buildClusters(DATA);
      var maxCount = clusters[0].count;

      clusters.forEach(function(c) {
        var r = 10 + (c.count / maxCount) * 40;
        var color = countToColor(c.count, maxCount);

        L.circleMarker([c.lat, c.lon], {
          radius: r,
          fillColor: color,
          fillOpacity: 0.25,
          color: color,
          weight: 2,
          opacity: 0.7,
        }).bindPopup('<b>' + c.city + '</b><br>' + c.count + ' trampolines').addTo(bubbleLayer);

        L.circleMarker([c.lat, c.lon], {
          radius: r * 0.25,
          fillColor: color,
          fillOpacity: 0.9,
          color: '#000',
          weight: 1,
        }).addTo(bubbleLayer);
      });

      document.getElementById('total').textContent = DATA.length;
    }

    renderBubbles();
    map.on('zoomend', renderBubbles);
  </script>
</body>
</html>
